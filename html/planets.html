<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/planets.css">
    <script src="../js/planets.js" type="module"></script>
    <script src="../js/main.js" type="module" defer></script>
    <title>Planets</title>
</head>
<body>
   <header>
    <div style="display:flex; align-items:center; gap:10px;">
        <h1 class="page-title">Solar system</h1>
        <button id="theme-toggle">🌙</button>
         <button id="sound-toggle">🔇</button>
    </div>
    <nav>
        <button class="dropdown-menu-btn" id="mobile-menu">☰</button>
        <div class="link-container" id="nav-links">
            <a href="../index.html">Home</a>
            <a href="planets.html">Planets</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>
</header><main>
    <div class="wrap">
        <div class="outer">
            <button class="btn p">&#8249;</button>
            <div class="track" id="t">
                <div class="card active" data-planet="mercury">
                    <img src="../img/planets/mercury.png" alt="Mercury">
                    <span>MERCURY</span>
                </div>
                <div class="card" data-planet="venus">
                    <img src="../img/planets/venus.png" alt="Venus">
                    <span>VENUS</span>
                </div>
                <div class="card" data-planet="earth">
                    <img src="../img/planets/earth.png" alt="Earth">
                    <span>EARTH</span>
                </div>
                <div class="card" data-planet="mars">
                    <img src="../img/planets/mars.png" alt="Mars">
                    <span>MARS</span>
                </div>
                <div class="card" data-planet="jupiter">
                    <img src="../img/planets/jupiter.png" alt="Jupiter">
                    <span>JUPITER</span>
                </div>
                <div class="card" data-planet="saturn">
                    <img src="../img/planets/saturn.png" alt="Saturn">
                    <span>SATURN</span>
                </div>
                <div class="card" data-planet="uranus">
                    <img src="../img/planets/uranus.png" alt="Uranus">
                    <span>URANUS</span>
                </div>
                <div class="card" data-planet="neptune">
                    <img src="../img/planets/neptune.png" alt="Neptune">
                    <span>NEPTUNE</span>
                </div>
            </div>
            <button class="btn n">&#8250;</button>
        </div>
        <div class="dots" id="dots"></div>
    </div>
</main>

    <section id="planet-info" class="info-container hidden">
        <button class="close-btn">&times;</button>
        <article class="info-box">
            <div class="content">
                <h2>Planet Name</h2>
                <p>Planet Description</p>
            </div>
        </article>
    </section>

    <footer>
    <div class="socialsBox">
        <p>Social Media</p>
        <a href="https://www.facebook.com"><img class="socials-icon" src="../img/facebook.png" alt="Facebook"></a>
        <a href="https://www.instagram.com"><img class="socials-icon" src="../img/instagram.png" alt="Instagram"></a>
        <a href="https://www.github.com"><img class="socials-icon" src="../img/github.png" alt="Github"></a>
        <a href="contact.html">Contact Us</a>
    </div>
    <p>&copy; copyrights 2026, credits Gitronauts</p>
    <div>
        <p>API Source</p>
        <a href="https://api.nasa.gov">Nasa APIS</a>
        <a href="https://api-ninjas.com">API Ninjas</a>
    </div>
</footer>
</body>
</html>
