<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Cosmic Feed</title>

   
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/contact.css">

   
    <script src="../js/main.js" type="module" defer></script>
</head>
<body>
  
 <header>
    <div style="display:flex; align-items:center; gap:10px;">
        <h1 class="page-title">COSMIC FEED</h1>
        <button id="theme-toggle">🌙</button>
         <button id="sound-toggle">🔇</button>
    </div>
    <nav>
        <button class="dropdown-menu-btn" id="mobile-menu">☰</button>
        <div class="link-container" id="nav-links">
            <a href="../index.html">Home</a>
            <a href="planets.html">Planets</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>
</header>

  
    <main>
        <div class="contact-container">
            <div class="contact-info">
                <h2>Contact Us</h2>
                <p>Have questions or want to collaborate? Reach out to us!</p>
            </div>
            <div class="contact-form">
                <h2>Send a Message</h2>
                <form>
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Your Name">

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Your Email">

                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Your Message"></textarea>

                    <button type="submit">Send</button>
                </form>
            </div>
        </div>
    </main>

    
    <footer>
        <div>
            <p>Social Media</p>
            <a href="https://www.facebook.com"><img class="socials-icon" src="../img/facebook.png" alt="Facebook"></a>
            <a href="https://www.instagram.com"><img class="socials-icon" src="../img/instagram.png" alt="Instagram"></a>
            <a href="https://www.github.com"><img class="socials-icon" src="../img/github.png" alt="Github"></a>
        </div>

        <p>&copy; 2026, Cosmic Feed</p>

        <div>
            <p>API Sources</p>
            <a href="https://api.nasa.gov">NASA API</a>
            <a href="https://api-ninjas.com">API Ninjas</a>
        </div>
    </footer>
</body>
</html>
